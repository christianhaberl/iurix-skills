name: Claude Code

on:
  # Auto-review whenever a PR is opened, reopened, or marked ready-for-review
  pull_request:
    types: [opened, reopened, ready_for_review]
  # Respond to @claude mentions in PR/issue comments and review comments
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only run on @claude mentions OR on non-draft PR events (auto-review)
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 20
            --allowedTools "mcp__github_inline_comment__create_inline_comment,mcp__github_comment__update_claude_comment,Bash(gh pr comment:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh issue comment:*),Bash(gh issue view:*),Bash(gh api:*),Read,Glob,Grep"
          prompt: |
            ${{ github.event_name == 'pull_request' && 'Review this PR for code quality, bugs, security, and performance. Use the mcp__github_inline_comment__create_inline_comment tool for specific code issues. ALWAYS finish by posting one summary comment using `gh pr comment` (or update_claude_comment) — even a brief "Looks good, no issues found." if there is nothing to flag. Do not exit silently.' || 'A user mentioned you in a comment. Read the triggering comment and respond directly by posting a PR/issue comment with `gh pr comment` (or `gh issue comment`). Always post a reply — never exit without commenting.' }}
