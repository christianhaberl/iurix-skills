name: Claude Code

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh issue comment:*),Bash(gh issue view:*),Read,Glob,Grep"
          prompt: |
            REPO: ${{ github.repository }}
            ${{ github.event_name == 'pull_request' && format('PR NUMBER: {0}', github.event.pull_request.number) || '' }}

            ${{ github.event_name == 'pull_request' && 'Review this pull request with a focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Security implications
            - Performance considerations

            The PR branch is already checked out in the current working directory.
            Use `gh pr comment` for the top-level summary.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) for specific line-level findings.
            Always post at least a brief summary comment — even "Looks good, no issues found." if nothing to flag. Only post GitHub comments — do not submit review text as plain messages.' || 'A user mentioned you in a comment. Read the triggering comment and respond by posting a PR/issue comment with `gh pr comment` or `gh issue comment`. Always post a reply.' }}
